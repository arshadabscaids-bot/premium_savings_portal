<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Premium Saving Portal - Smart Offer Platform</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- Navbar Start -->

<nav class="navbar navbar-expand-lg navbar-dark shadow sticky-top">

    <div class="container-fluid">

        <!-- Logo -->

        <a class="navbar-brand d-flex align-items-center"
           href="/">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="PSP Logo"
                 height="50"
                 class="me-2">

            <span class="fw-bold site-title">
                PREMIUM SAVINGS PORTAL
            </span>

        </a>
        
<!-- Right Side Buttons -->
    <div class="d-flex align-items-center ms-auto">

      <!-- Wishlist -->
      <a href="/wishlist"
       class="btn btn-outline-light me-2">

       ❤️ Wishlist

        </a>

        <!-- Dark Mode -->

        <button class="btn btn-outline-light"
                onclick="toggleDarkMode()">

            <i class="bi bi-moon-fill"></i>

        </button>

    </div>

</nav>

<!-- Navbar End -->


<!-- Main Content -->

<div class="container-fluid p-0">

    {% block content %}
    {% endblock %}

</div>


<!-- Footer Start -->

<footer class="footer">

    <div class="container text-center">

        <h3>
            Premium Savings Portal
        </h3>

        <p>

            Find Best Limited Offers from Amazon,
            Flipkart, Meesho and Myntra.

        </p>

        <hr>

        <p>

            © 2026 Premium Savings Portal.
            All Rights Reserved.

        </p>

    </div>

</footer>

<!-- Footer End -->


<!-- Scroll Top Button -->

<button
    onclick="topFunction()"
    id="topBtn"
    class="btn btn-danger">

    ↑

</button>


<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>


<!-- Custom JS -->

<script src="{{ url_for('static', filename='script.js/js') }}">
</script>

</body>

</html>
